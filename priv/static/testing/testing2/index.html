<style>

/* Style the tab */

.tab {
  overflow: hidden;
}

/* Style the buttons that are used to open the tab content */

#blog {
  background-image: url("../../kogasatopia/buttons/blogselected.png");
  background-repeat: no-repeat;
  float: left;
  border: none;
  outline: none;
  cursor: pointer;
  transition: 0.3s;
  padding: 12px 40px;
}

#updates {
  background-image: url("../../kogasatopia/buttons/updatesselected.png");
  background-repeat: no-repeat;
  float: left;
  border: none;
  outline: none;
  cursor: pointer;
  transition: 0.3s;
  padding: 12px 55px;
}

#news {
  background-image: url("../../kogasatopia/buttons/newsselected.png");
  background-repeat: no-repeat;
  float: left;
  border: none;
  outline: none;
  cursor: pointer;
  transition: 0.3s;
  padding: 12px 40px;
}


.tab button {
}

/* Change background color of buttons on hover */
.tab button:hover {
}

/* Create an active/current tablink class */
.tab button.active {
}

/* Style the tab content */
.tabcontent {
  display: none;
}

</style>

<script>

document.getElementById("blog").click();

function openCity(evt, cityName) {
  var i, tabcontent, tablinks;

  tabcontent = document.getElementsByClassName("tabcontent");
  for (i = 0; i < tabcontent.length; i++) {
    tabcontent[i].style.display = "none";
  }

  tablinks = document.getElementsByClassName("tablinks");
  for (i = 0; i < tablinks.length; i++) {
    tablinks[i].className = tablinks[i].className.replace(" active", "");
  }

  document.getElementById(cityName).style.display = "block";
  evt.currentTarget.className += " active";
}

</script>
