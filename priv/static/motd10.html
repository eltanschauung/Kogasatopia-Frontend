<!DOCTYPE html>
<html>
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Freeman&family=Walter+Turncoat&display=swap" rel="stylesheet">
  <style type="text/css" media="screen">
    html, body {
      margin: 0;
      overflow: hidden;
      height: 100%;
    }

    img.background {
      position: absolute;
      z-index: -1;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .center-text {
      position: absolute;
      z-index: 1;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-family: 'Alfa Slab One', sans-serif;
      font-size: 32px;
      text-align: center;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.6);
    }
  </style>
</head>
<body>
  <img class="background" src="motd/motd_current.png" alt="Something went wrong!">
  <div class="center-text">
    Welcome to the Hakurei Shrine!
    <div style="font-family: 'Freeman', sans-serif; font-size: 10px; margin-top: 8px;">
      Try out !news and !rules
    </div>
  </div>
</body>
</html>
