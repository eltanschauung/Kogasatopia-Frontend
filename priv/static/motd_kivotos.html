<!DOCTYPE html>
<html>
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Freeman&family=Walter+Turncoat&display=swap" rel="stylesheet">
  <style type="text/css" media="screen">
    html, body {
      margin: 0;
      overflow: hidden;
      height: 100%;
    }

    img.background {
      position: absolute;
      z-index: -1;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .content-box {
      background-color: rgba(0, 0, 0, 0.7); /* 70% opaque black */
      display: inline-block;
      padding: 20px 40px;
      border-radius: 8px;
      margin: 20px 0 0 20px;
    }

    a:link {
      color: #e3d16d;
      text-decoration: none;
    }

    a:visited {
      color: #e3d16d;
      text-decoration: none;
    }

    a:hover {
      color: #ffffff;
      text-decoration: none;
    }

    a:active {
      color: #e3d16d;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <img class="background" src="/motd/motd_kivotos.jpg">
  
  <div class="content-box">
    <div>
      <span style="color:white; font-family: 'Alfa Slab One', sans-serif; font-size:22px;">
        Kivotos | Quickplay Server | New York
      </span>
    </div>

    <div>
      <span style="color:white; font-family: 'Freeman', sans-serif; font-size: 16px;">
        Click <a href="https://steamcommunity.com/chat/invite/Es09gkBm">here</a> to join the Steam chat!
      </span>
    </div>

    <div>
      <br>
      <span style="color:white; font-family: 'Walter Turncoat', cursive; font-size:18px;">
        <i>Nexon is saving TF2!!!!!</i>
	<ul>
	  <li>random crits are off</li>
	  <li>melee random crits are on</li>
	  <li>bullet spread is off</li>
	  <li>alltalk is on</li>
	</ul>
      </span>
    </div>
  </div>
</body>
</html>
